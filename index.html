<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HPC Test Framework</title>

  <style>
    body {
      font-family: Segoe UI, Arial, sans-serif;
      margin: 40px;
      background-color: #ffffff;
    }

    h1 {
      margin-bottom: 30px;
    }

    h2 {
      margin-top: 30px;
    }

    .section {
      margin-top: 20px;
    }

    .test-list label {
      display: block;
      margin: 6px 0;
    }

    input[type="text"] {
      width: 300px;
      padding: 6px;
      margin-top: 6px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
    }

    pre {
      background: #f5f5f5;
      padding: 16px;
      margin-top: 16px;
      border: 1px solid #ccc;
      width: 800px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>HPC Test and verification automation framework</h1>

  <!-- Test cases -->
  <div class="section">
    <h2>Test cases</h2>

    <div class="test-list">
      <label><input type="checkbox" value="XDR secure reboot verification"> XDR secure reboot verification</label>
      <label><input type="checkbox" value="XDR code upgrade"> XDR code upgrade</label>
      <label><input type="checkbox" value="XDR code upgrade ISSU"> XDR code upgrade ISSU</label>
      <label><input type="checkbox" value="XDR NDM template configure verification"> XDR NDM template configure verification</label>
      <label><input type="checkbox" value="XDR shield testing"> XDR shield testing</label>
      <label><input type="checkbox" value="XDR sharp testing"> XDR sharp testing</label>
    </div>
  </div>

  <!-- Input -->
  <div class="section">
    <h2>Input</h2>

    <label>
      Device name:<br>
      <input type="text" id="deviceName" placeholder="e.g. STR43-XDR1-01" />
    </label>
  </div>

  <!-- Run -->
  <div class="section">
    <button onclick="runTests()">Run selected tests</button>
  </div>

  <!-- Result -->
  <div class="section">
    <h2>Result</h2>
    <pre id="result">No execution yet.</pre>
  </div>

  <script>
    async function runTests() {
      const deviceName = document.getElementById("deviceName").value.trim();

      const selectedTests = Array.from(
        document.querySelectorAll('input[type="checkbox"]:checked')
      ).map(cb => cb.value);

      if (!deviceName) {
        alert("Please input a device name.");
        return;
      }

      if (selectedTests.length === 0) {
        alert("Please select at least one test case.");
        return;
      }

      const payload = {
        deviceName: deviceName,
        testCases: selectedTests
      };

      document.getElementById("result").innerText =
        "Submitting request...\n\n" + JSON.stringify(payload, null, 2);

      try {
        const response = await fetch(
          "https://hpctestdashboard.azurewebsites.net/api/icm/run",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          }
        );

        const text = await response.text();
        document.getElementById("result").innerText = text;
      }
      catch (err) {
        document.getElementById("result").innerText =
          "Error calling backend:\n" + err;
      }
    }
  </script>

</body>
</html>
