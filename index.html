<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HPC Test Dashboard</title>

  <style>
    body {
      font-family: Segoe UI, Arial, sans-serif;
      margin: 40px;
      background-color: #ffffff;
    }

    h1 {
      margin-bottom: 20px;
    }

    label {
      font-weight: 600;
      margin-top: 12px;
      display: block;
    }

    select, input {
      width: 320px;
      padding: 6px;
      margin-top: 4px;
    }

    button {
      margin-top: 20px;
      padding: 8px 18px;
      font-size: 14px;
      cursor: pointer;
    }

    pre {
      background: #f5f5f5;
      padding: 14px;
      margin-top: 16px;
      width: 700px;
      overflow-x: auto;
      border: 1px solid #ddd;
    }
  </style>
</head>

<body>

  <h1>HPC Test Dashboard</h1>

  <label for="action">Action</label>
  <select id="action">
    <option value="SecureBootValidation">Secure Boot Validation</option>
    <option value="CollectTechsupport">Collect Techsupport</option>
  </select>

  <label for="target">Target</label>
  <select id="target">
    <option value="XDR">XDR</option>
    <option value="NDR">NDR</option>
    <option value="VM">VM</option>
  </select>

  <label for="cluster">Cluster</label>
  <input id="cluster" value="GPC-PHX-01" />

  <button onclick="runAutomation()">Run</button>

  <h3>Result</h3>
  <pre id="result">---</pre>

  <script>
    async function runAutomation() {
      const payload = {
        action: document.getElementById("action").value,
        target: document.getElementById("target").value,
        cluster: document.getElementById("cluster").value,
        options: {
          collectTechsupport: true
        }
      };

      document.getElementById("result").innerText =
        "Calling backend... (expect 401 until EasyAuth is enabled)";

      try {
        const response = await fetch(
          "https://hpctestdashboard-fcctcfe3csdcexc4.eastus-01.azurewebsites.net/api/icm/run",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          }
        );

        const text = await response.text();

        if (!response.ok) {
          document.getElementById("result").innerText =
            "Request failed (expected for now):\n\n" +
            response.status + " " + response.statusText + "\n\n" +
            text;
          return;
        }

        const data = JSON.parse(text);
        document.getElementById("result").innerText =
          JSON.stringify(data, null, 2);
      }
      catch (err) {
        document.getElementById("result").innerText =
          "Error calling backend:\n" + err;
      }
    }
  </script>

</body>
</html>
``
